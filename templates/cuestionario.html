<!DOCTYPE html>
<!-- Le dice al navegador que este archivo es HTML5 -->

<html lang="es">
<!-- lang="es" indica que el contenido está en español -->

<head>
<!-- La cabecera, el ciudadano no la ve pero el navegador sí la necesita -->

    <meta charset="UTF-8">
    <!-- Permite usar tildes, ñ y caracteres especiales
         sin que salgan símbolos raros en pantalla -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte bien a móviles y tablets
         cumpliendo el requisito no funcional RNF-05 de la aplicación -->

    <title>Cuestionario · Semáforo</title>
    <!-- Texto que aparece en la pestaña del navegador -->

    <style>
    /* Todo lo que va aquí es CSS, el lenguaje de los colores y el diseño
       Cada bloque .nombre { } define el estilo de los elementos
       que usen esa clase en el HTML de abajo */

        body {
            /* El cuerpo entero de la página */
            font-family: Arial, sans-serif;
            /* Fuente Arial, y si no está disponible cualquier sans-serif */
            max-width: 800px;
            /* La página no se expandirá más de 800 píxeles de ancho */
            margin: 0 auto;
            /* Centra la página horizontalmente en la pantalla */
            padding: 20px;
            /* Espacio interior de 20 píxeles alrededor del contenido */
            background-color: #f5f5f5;
            /* Color de fondo gris muy claro */
        }

        .header {
            /* Barra superior azul oscura, igual que en inicio.html
               Usamos el mismo estilo en todas las páginas para dar
               coherencia visual a la aplicación */
            background-color: #0D1B2A;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            /* Esquinas redondeadas */
            margin-bottom: 20px;
        }

        .barra-progreso-fondo {
            /* El fondo gris de la barra de progreso
               Es el contenedor vacío que representa el 100% */
            background-color: #EEEEEE;
            border-radius: 10px;
            /* Esquinas muy redondeadas para efecto píldora */
            height: 18px;
            /* Alto de la barra en píxeles */
            margin: 10px 0 20px 0;
            /* Margen: 10px arriba, 0 lados, 20px abajo */
        }

        .barra-progreso-relleno {
            /* La parte azul que va creciendo con cada pregunta
               Su ancho se calcula dinámicamente con Jinja2 */
            background-color: #2E75B6;
            height: 18px;
            border-radius: 10px;
            width: {{ (pregunta.pr / total * 100) | int }}%;
            /* JINJA2: calcula el porcentaje de progreso
               pregunta.pr es el número de pregunta actual (ej: 3)
               total es el total de preguntas (10)
               3 / 10 * 100 = 30% → la barra ocupa el 30% del ancho
               | int convierte el resultado a número entero
               sin decimales (29 en lugar de 29.99) */
        }

        .pregunta-box {
            /* Cuadro azul claro que contiene el texto de la pregunta */
            background-color: #EBF3FB;
            border: 2px solid #2E75B6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: bold;
            /* bold significa negrita */
        }

        .opcion {
            /* Estilo base común para los tres botones de respuesta
               Todos comparten estas propiedades */
            display: block;
            /* block hace que cada botón ocupe toda la línea
               y no se pongan uno al lado del otro */
            width: 100%;
            /* Ancho completo del contenedor */
            padding: 14px 20px;
            /* 14px arriba/abajo, 20px izquierda/derecha */
            margin-bottom: 10px;
            /* Separación de 10px entre botones */
            border-radius: 8px;
            border: 2px solid;
            /* El color del borde lo define cada subclase abajo */
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            /* El cursor cambia a manita al pasar por encima
               indicando que se puede pulsar */
            text-align: left;
            /* Texto alineado a la izquierda dentro del botón */
        }

        .opcion-si {
            /* Botón SÍ en rojo — señal de riesgo alto
               Orden semáforo: rojo arriba */
            background-color: #FFE0E0;
            /* Fondo rojo muy suave */
            border-color: #CC2222;
            color: #CC2222;
        }

        .opcion-nose {
            /* Botón NO ESTOY SEGURO en amarillo — señal dudosa
               Orden semáforo: amarillo en medio */
            background-color: #FFF8D0;
            /* Fondo amarillo muy suave */
            border-color: #B8960C;
            color: #7A6000;
        }

        .opcion-no {
            /* Botón NO en verde — sin riesgo
               Orden semáforo: verde abajo */
            background-color: #D0F5DC;
            /* Fondo verde muy suave */
            border-color: #1A7A2A;
            color: #1A7A2A;
        }

        .opcion:hover {
            /* hover significa "cuando el ratón está encima"
               Al pasar el ratón la opción se vuelve un poco
               transparente para indicar que se puede pulsar */
            opacity: 0.75;
            /* 1 es totalmente opaco, 0 es invisible
               0.75 es ligeramente transparente */
        }

        .btn-cancelar {
            /* Botón gris para cancelar y volver al inicio */
            background-color: #EEEEEE;
            color: #555;
            padding: 10px 20px;
            border: 1px solid #CCCCCC;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            /* Quita el subrayado típico de los enlaces <a> */
            display: inline-block;
            margin-top: 15px;
        }

    </style>
</head>

<body>
<!-- Aquí empieza todo lo que el ciudadano verá en pantalla -->

    <div class="header">
    <!-- div es una caja que agrupa elementos
         class="header" le aplica el estilo azul oscuro definido arriba -->
        <h2>Semáforo · Generador de Dossier</h2>
    </div>

    <h2>Cuestionario de Riesgo</h2>
    <!-- h2 es un título de segundo nivel, más pequeño que h1 -->

    <p style="color:#888; font-style:italic;">
        Responda con sinceridad para obtener un resultado preciso
    </p>
    <!-- style="..." aplica CSS directamente sobre este elemento
         sin necesidad de crear una clase -->

    <!-- Indicador textual de progreso -->
    <p>
        <strong>Pregunta {{ pregunta.pr }} de {{ total }}</strong>
        <!-- JINJA2: {{ pregunta.pr }} muestra el número de pregunta actual
             {{ total }} muestra el total de preguntas (10)
             Flask envió estos datos desde app.py con render_template
             strong pone el texto en negrita -->
    </p>

    <!-- Barra de progreso visual -->
    <div class="barra-progreso-fondo">
    <!-- Este div es el fondo gris, el contenedor vacío -->
        <div class="barra-progreso-relleno"></div>
        <!-- Este div es la parte azul que va creciendo
             Su ancho está calculado en el CSS con Jinja2 -->
    </div>

    <!-- Cuadro azul con el texto de la pregunta actual -->
    <div class="pregunta-box">
        {{ pregunta.texto }}
        <!-- JINJA2: muestra el campo "texto" de la pregunta actual
             En Python sería pregunta["texto"]
             En Jinja2 dentro del HTML se escribe con punto: pregunta.texto
             Flask envió este dato desde app.py -->
    </div>

    <!-- Formulario con las tres opciones de respuesta -->
    <form action="/responder" method="POST">
    <!-- form es el formulario que enviará la respuesta a Flask
         action="/responder" indica a qué ruta de Flask se envía
         method="POST" envía los datos de forma segura (sobre cerrado)
         en lugar de GET que sería visible en la URL (postal abierta) -->

        <button type="submit" name="respuesta" value="si"
                class="opcion opcion-si">
            Sí, esto me ha ocurrido
        </button>
        <!-- type="submit" significa que al pulsar envía el formulario
             name="respuesta" es el nombre con el que Flask recibirá el dato
             value="si" es el valor que Flask leerá con request.form["respuesta"]
             Cuando Flask reciba "si" sumará valor_si a la puntuación -->

        <button type="submit" name="respuesta" value="nose"
                class="opcion opcion-nose">
            No estoy seguro/a
        </button>
        <!-- value="nose" → Flask sumará valor_nose a la puntuación -->

        <button type="submit" name="respuesta" value="no"
                class="opcion opcion-no">
            No, esto no me ha ocurrido
        </button>
        <!-- value="no" → Flask no sumará ningún punto (valor_no = 0) -->

    </form>
    <!-- Fin del formulario -->

    <!-- Enlace para cancelar y volver al inicio sin terminar -->
    <a href="/" class="btn-cancelar">← Cancelar y volver al inicio</a>
    <!-- a es un enlace, href="/" lleva a la página de inicio
         El "/" es la ruta raíz definida en app.py como función inicio() -->

</body>
<!-- Fin del contenido visible -->

</html>
<!-- Fin del documento HTML -->
